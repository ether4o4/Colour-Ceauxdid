name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Required repository secrets:
#   EXPO_TOKEN                      - Expo access token (https://expo.dev/accounts/[account]/settings/access-tokens)
#   EXPO_PUBLIC_OPENROUTER_API_KEY  - OpenRouter API key (https://openrouter.ai/keys)

jobs:
  build:
    name: EAS Build (Android Preview APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.EXPO_PUBLIC_OPENROUTER_API_KEY }}
